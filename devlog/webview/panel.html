<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src {{cspSource}}; script-src {{cspSource}};"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevLog</title>
    <link rel="stylesheet" href="{{styleUri}}" />
  </head>
  <body>
    <header class="panel-header">
      <h1>DevLog</h1>
      <div class="panel-controls">
        <button id="pause-button" type="button">Pause</button>
        <button id="resume-button" type="button">Resume</button>
        <button id="clear-button" type="button">Clear</button>
      </div>
    </header>
    <section id="status-banner" class="status-banner" role="status"></section>
    <p id="empty-state" class="empty-state">
      No lessons yet. Make a few code changes to see beginner-friendly summaries.
    </p>
    <main id="log-feed" class="log-feed" aria-live="polite"></main>
    <script src="{{scriptUri}}"></script>
  </body>
</html>
